<!DOCTYPE html>
<html lang="hi">
<head>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="48x48" href="icon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FBF7F2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#161210" media="(prefers-color-scheme: dark)">
  <title>दादाजी — Live Captions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #FBF7F2;
      --surface:       #FFFFFF;
      --border:        #DDD0C0;
      --text:          #1C1410;
      --text-muted:    #8A7A68;
      --text-interim:  #C8B8A4;
      --start:         #2D7D46;
      --stop:          #B5341B;
      --pill-active:   #2D7D46;
      --sz-muted:      #B0A090;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #161210;
        --surface:       #201C18;
        --border:        #3A302A;
        --text:          #F5EDE2;
        --text-muted:    #8A7A68;
        --text-interim:  #4A3C30;
        --start:         #3AA05A;
        --stop:          #D04020;
        --pill-active:   #3AA05A;
        --sz-muted:      #6A5A48;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans Devanagari', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      overflow: hidden;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.on {
      background: var(--start);
      animation: blink 1.3s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    #statusText {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .lang-pills {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .lang-pill {
      padding: 5px 13px;
      font-size: 13px;
      font-family: inherit;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s;
    }
    .lang-pill.active {
      background: var(--pill-active);
      color: #fff;
    }

    #fsBtn {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Warning ── */
    #warnBox {
      display: none;
      flex-shrink: 0;
      margin: 10px 16px 0;
      padding: 12px 16px;
      background: #FFF3C0;
      border: 1px solid #E8C030;
      border-radius: 10px;
      font-size: 14px;
      color: #5C4400;
      line-height: 1.6;
    }
    @media (prefers-color-scheme: dark) {
      #warnBox { background: #28200A; border-color: #886800; color: #FFD84A; }
    }

    /* ── Main text display ── */
    #display {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px 20px;
      font-size: 52px;
      line-height: 1.75;
      color: var(--text);
      word-break: break-word;
      -webkit-overflow-scrolling: touch;
    }

    #interimText { color: var(--text-interim); }

    #hint {
      color: var(--text-interim);
      font-size: 34px;
      line-height: 1.65;
    }
    #hint small {
      font-size: 0.58em;
      display: block;
      margin-top: 4px;
    }

    /* ── Footer ── */
    footer {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .size-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sz-sm { font-size: 12px; color: var(--sz-muted); font-weight: 500; }
    .sz-lg { font-size: 20px; color: var(--sz-muted); font-weight: 500; }
    .sz-num { font-size: 11px; color: var(--sz-muted); min-width: 36px; text-align: right; }

    input[type=range] {
      flex: 1; height: 4px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 99px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--start); cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--start); cursor: pointer; border: none;
    }

    .btn-row { display: flex; gap: 10px; }

    #mainBtn {
      flex: 1;
      padding: 18px 16px;
      border: none; border-radius: 14px;
      font-size: 19px; font-weight: 500;
      font-family: inherit;
      background: var(--start); color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #mainBtn:active { transform: scale(0.97); }
    #mainBtn.stop   { background: var(--stop); }
    #mainBtn svg    { width: 24px; height: 24px; fill: #fff; flex-shrink: 0; }

    #clearBtn {
      padding: 18px 20px;
      border: 1px solid var(--border); border-radius: 14px;
      background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #clearBtn:active { background: var(--border); }
    #clearBtn svg {
      width: 22px; height: 22px;
      fill: none; stroke: var(--text-muted);
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Scrollbar */
    #display::-webkit-scrollbar { width: 5px; }
    #display::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    @media (max-width: 480px) {
      #display { padding: 22px 18px 16px; font-size: 40px; }
      #hint     { font-size: 26px; }
      #mainBtn  { font-size: 17px; padding: 16px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">शुरू करने के लिए नीचे दबाएँ</span>
  </div>
  <div class="controls-right">
    <div class="lang-pills">
      <button class="lang-pill active" id="hiBtn" onclick="setLang('hi')">हिन्दी</button>
      <button class="lang-pill"        id="enBtn" onclick="setLang('en')">English</button>
    </div>
    <button id="fsBtn" onclick="toggleFS()" title="Fullscreen" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3"  y1="21" x2="10" y2="14"/>
      </svg>
    </button>
  </div>
</header>

<div id="warnBox">
  ⚠️ यह ऐप <strong>Google Chrome</strong> या <strong>Microsoft Edge</strong> में खोलें।<br>
  Please open this file in <strong>Google Chrome</strong> or <strong>Microsoft Edge</strong> for Hindi speech support.
</div>

<div id="display">
  <span id="finalText"></span><span id="interimText"></span>
  <span id="hint">
    बोलिए — शब्द यहाँ दिखेंगे
    <small>Speak — words will appear here</small>
  </span>
</div>

<footer>
  <div class="size-row">
    <span class="sz-sm">A</span>
    <input type="range" id="sizeSlider" min="28" max="80" value="52" step="2"
           oninput="resizeFont(this.value)">
    <span class="sz-lg">A</span>
    <span class="sz-num" id="sizeLabel">52px</span>
  </div>
  <div class="btn-row">
    <button id="mainBtn" onclick="toggleListen()">
      <svg id="btnIcon" viewBox="0 0 24 24">
        <path id="btnPath"
          d="M12 1a3.5 3.5 0 0 0-3.5 3.5v7a3.5 3.5 0 0 0 7 0v-7A3.5 3.5 0 0 0 12 1z
             M6.5 11.5a5.5 5.5 0 0 0 11 0h2a7.5 7.5 0 0 1-6.5 7.43V21h2v2h-6v-2h2v-2.07
             A7.5 7.5 0 0 1 4.5 11.5h2z"/>
      </svg>
      <span id="btnLabel">सुनना शुरू करें</span>
    </button>
    <button id="clearBtn" onclick="clearAll()" title="Clear text" aria-label="Clear all text">
      <svg viewBox="0 0 24 24">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </div>
</footer>

<script>
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null, active = false, finalText = '', lang = 'hi-IN';

  /* ── Setup speech recognition ── */
  function setup() {
    if (!SR) {
      document.getElementById('warnBox').style.display = 'block';
      const btn = document.getElementById('mainBtn');
      btn.disabled = true; btn.style.opacity = '0.4';
      setStatus(false, 'Browser not supported — please open in Chrome or Edge');
      return false;
    }
    rec = new SR();
    rec.continuous      = true;
    rec.interimResults  = true;
    rec.maxAlternatives = 1;
    rec.lang            = lang;

    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
        else                       interim   += e.results[i][0].transcript;
      }
      render(finalText, interim);
    };

    rec.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      if (e.error === 'not-allowed') {
        setStatus(false, 'Mic blocked — allow microphone in your browser settings');
        active = false; syncBtn(); return;
      }
      setStatus(false, 'Error: ' + e.error + ' — tap Start again');
      active = false; syncBtn();
    };

    /* Auto-restart so it keeps listening continuously */
    rec.onend = () => {
      if (active) setTimeout(() => { try { if (rec) rec.start(); } catch (_) {} }, 250);
    };
    return true;
  }

  /* ── Render text ── */
  function render(fin, int) {
    document.getElementById('finalText').textContent   = fin;
    document.getElementById('interimText').textContent = int;
    document.getElementById('hint').style.display      = (fin || int) ? 'none' : '';
    const d = document.getElementById('display');
    d.scrollTop = d.scrollHeight;
  }

  /* ── Toggle listening ── */
  function toggleListen() {
    if (!rec && !setup()) return;
    if (active) {
      active = false;
      try { rec.stop(); } catch (_) {}
      setStatus(false, lang === 'hi-IN'
        ? 'रुका हुआ — फिर से शुरू करने के लिए दबाएँ'
        : 'Stopped — tap Start again');
    } else {
      finalText = ''; render('', '');
      active = true;
      rec.lang = lang;
      try { rec.start(); } catch (_) {
        rec = null;
        if (setup()) { rec.lang = lang; try { rec.start(); } catch (__) {} }
      }
      setStatus(true, lang === 'hi-IN' ? 'सुन रहा है...' : 'Listening...');
    }
    syncBtn();
  }

  /* ── Sync button appearance ── */
  function syncBtn() {
    const btn  = document.getElementById('mainBtn');
    const lbl  = document.getElementById('btnLabel');
    const path = document.getElementById('btnPath');
    if (active) {
      lbl.textContent = lang === 'hi-IN' ? 'बंद करें' : 'Stop';
      btn.classList.add('stop');
      /* Square stop icon */
      path.setAttribute('d', 'M7 7h10v10H7z');
    } else {
      lbl.textContent = lang === 'hi-IN' ? 'सुनना शुरू करें' : 'Start listening';
      btn.classList.remove('stop');
      /* Mic icon */
      path.setAttribute('d',
        'M12 1a3.5 3.5 0 0 0-3.5 3.5v7a3.5 3.5 0 0 0 7 0v-7A3.5 3.5 0 0 0 12 1z' +
        'M6.5 11.5a5.5 5.5 0 0 0 11 0h2a7.5 7.5 0 0 1-6.5 7.43V21h2v2h-6v-2h2v-2.07' +
        'A7.5 7.5 0 0 1 4.5 11.5h2z');
    }
  }

  /* ── Status dot + label ── */
  function setStatus(on, text) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('dot').className = 'dot' + (on ? ' on' : '');
  }

  /* ── Language switch ── */
  function setLang(code) {
    lang = code === 'hi' ? 'hi-IN' : 'en-IN';
    document.getElementById('hiBtn').className = 'lang-pill' + (code === 'hi' ? ' active' : '');
    document.getElementById('enBtn').className = 'lang-pill' + (code === 'en' ? ' active' : '');
    if (active && rec) {
      try { rec.stop(); } catch (_) {}
      finalText = ''; render('', '');
      setTimeout(() => {
        if (active && rec) { rec.lang = lang; try { rec.start(); } catch (_) {} }
      }, 300);
    }
    syncBtn();
  }

  /* ── Clear ── */
  function clearAll() {
    finalText = ''; render('', '');
    document.getElementById('hint').style.display = '';
  }

  /* ── Font resize ── */
  function resizeFont(v) {
    document.getElementById('display').style.fontSize = v + 'px';
    document.getElementById('sizeLabel').textContent  = v + 'px';
  }

  /* ── Fullscreen ── */
  function toggleFS() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }

  /* ── Clean up everything on close ── */
  window.addEventListener('beforeunload', () => {
    active = false; finalText = '';
    if (rec) { try { rec.abort(); } catch (_) {} rec = null; }
  });

  setup();
</script>
</body>
</html>
